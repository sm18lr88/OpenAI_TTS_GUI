name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync deps
        run: uv sync --extra dev --python 3.14

      - name: Build exe
        run: uv run pyinstaller --noconfirm openai_tts.spec

      - name: Build installer
        shell: pwsh
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsis)) {
            choco install nsis --no-progress -y
          }
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Zip portable
        shell: pwsh
        run: Compress-Archive -Path dist\OpenAI-TTS\* -DestinationPath dist\OpenAI-TTS-portable.zip

      - name: Verify Windows artifacts
        shell: pwsh
        run: |
          $required = @(
            "dist\OpenAI-TTS\openai_tts_bin.exe",
            "dist\OpenAI-TTS-Setup.exe",
            "dist\OpenAI-TTS-portable.zip"
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) { throw "Missing artifact: $path" }
            if ((Get-Item $path).Length -le 0) { throw "Empty artifact: $path" }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenAI-TTS-windows
          path: |
            dist/OpenAI-TTS-Setup.exe
            dist/OpenAI-TTS-portable.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync deps
        run: uv sync --extra dev --python 3.14

      - name: Build
        run: uv run pyinstaller --noconfirm openai_tts.spec

      - name: Zip app
        run: cd dist && zip -r OpenAI-TTS-macos.zip OpenAI-TTS/

      - name: Verify macOS artifact
        run: test -s dist/OpenAI-TTS-macos.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenAI-TTS-macos
          path: dist/OpenAI-TTS-macos.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: OpenAI-TTS-windows
          path: artifacts/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: OpenAI-TTS-macos
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## OpenAI TTS v1.3.0

            Desktop GUI and CLI for generating speech audio from text using OpenAI's TTS API.

            ### What's New
            - **Polished desktop UI** - flatter dark theme and resizable controls
            - **More responsive startup** - background ffmpeg and API key checks
            - **Robust ffmpeg discovery** - improved PATH handling for packaged and source runs
            - **Safer worker lifecycle** - cleaner cancellation and shutdown behavior
            - **Windows installer** — one-click setup with Start Menu and Desktop shortcuts
            - **Python 3.14** required

            ### Downloads
            | File | Description |
            |---|---|
            | `OpenAI-TTS-Setup.exe` | Windows installer (recommended) |
            | `OpenAI-TTS-portable.zip` | Portable Windows build — extract and run |
            | `OpenAI-TTS-macos.zip` | macOS build |

            ### Requirements
            - An [OpenAI API key](https://platform.openai.com/api-keys)
            - [FFmpeg](https://ffmpeg.org/download.html) installed and on PATH

          files: |
            artifacts/OpenAI-TTS-Setup.exe
            artifacts/OpenAI-TTS-portable.zip
            artifacts/OpenAI-TTS-macos.zip
