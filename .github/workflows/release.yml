name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync deps
        run: uv sync --extra dev --python 3.12

      - name: Build exe
        run: uv run pyinstaller --noconfirm openai_tts.spec

      - name: Build installer
        shell: pwsh
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsis)) {
            choco install nsis --no-progress -y
          }
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Zip portable
        shell: pwsh
        run: Compress-Archive -Path dist\OpenAI-TTS\* -DestinationPath dist\OpenAI-TTS-portable.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenAI-TTS-windows
          path: |
            dist/OpenAI-TTS-Setup.exe
            dist/OpenAI-TTS-portable.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync deps
        run: uv sync --extra dev --python 3.12

      - name: Build
        run: uv run pyinstaller --noconfirm openai_tts.spec

      - name: Zip app
        run: cd dist && zip -r OpenAI-TTS-macos.zip OpenAI-TTS/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenAI-TTS-macos
          path: dist/OpenAI-TTS-macos.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: OpenAI-TTS-windows
          path: artifacts/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: OpenAI-TTS-macos
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/OpenAI-TTS-Setup.exe
            artifacts/OpenAI-TTS-portable.zip
            artifacts/OpenAI-TTS-macos.zip
